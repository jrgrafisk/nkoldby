<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - Nicolai Koldby</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .post-detail {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    .post-featured-image {
      width: 100%;
      height: 400px;
      object-fit: cover;
      border-radius: var(--radius-12);
      margin-bottom: 40px;
    }

    .post-meta {
      display: flex;
      gap: 20px;
      color: var(--text-light);
      font-size: 0.95rem;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .post-detail h1 {
      margin-bottom: 30px;
      line-height: 1.3;
    }

    .post-body {
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .post-body h2 {
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .post-body h3 {
      margin-top: 30px;
      margin-bottom: 15px;
    }

    .post-body p {
      margin-bottom: 20px;
    }

    .post-body ul, .post-body ol {
      margin-left: 20px;
      margin-bottom: 20px;
    }

    .post-body li {
      margin-bottom: 10px;
    }

    .post-body code {
      background-color: var(--bg-light);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .post-body pre {
      background-color: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .post-body pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }

    .post-navigation {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--border-light);
    }

    .nav-item {
      padding: 20px;
      background-color: var(--bg-light);
      border-radius: 8px;
      text-decoration: none;
      transition: var(--transition);
    }

    .nav-item:hover {
      background-color: #ececec;
    }

    .nav-label {
      font-size: 0.875rem;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .nav-title {
      color: var(--primary-accent);
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .post-detail {
        padding: 30px 16px;
      }

      .post-featured-image {
        height: 250px;
      }

      .post-navigation {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="index.html" class="logo">NK</a>
      </div>
      <nav class="navbar-menu" id="navMenu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="portfolio.html" class="nav-link">Portfolio</a>
        <a href="blog.html" class="nav-link">Blog</a>
        <div class="nav-auth" id="navAuth">
          <a href="login.html" class="nav-link">Login</a>
          <a href="login.html?mode=register" class="btn btn-primary">Sign Up</a>
        </div>
        <div class="nav-user" id="navUser" style="display: none;">
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
      </nav>
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main>
    <div id="postContent">
      <div class="spinner"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-col">
          <h4>Nicolai Koldby</h4>
          <p>Web developer and digital project creator.</p>
        </div>
        <div class="footer-col">
          <h4>Quick Links</h4>
          <ul>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="blog.html">Blog</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Nicolai Koldby. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/video-lazy-load.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
