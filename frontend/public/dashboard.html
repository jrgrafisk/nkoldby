<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard - Manage your posts">
  <title>Dashboard - Nicolai Koldby</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .dashboard-header h1 {
      margin-bottom: 0;
    }

    .dashboard-content {
      display: grid;
      grid-template-columns: 1fr 3fr;
      gap: 40px;
    }

    .sidebar {
      background-color: var(--bg-light);
      padding: 24px;
      border-radius: var(--radius-12);
      height: fit-content;
    }

    .sidebar h3 {
      margin-bottom: 20px;
    }

    .sidebar-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .sidebar-item:last-child {
      border-bottom: none;
    }

    .sidebar-item a {
      color: var(--text-secondary);
      display: block;
    }

    .sidebar-item a:hover {
      color: var(--primary-accent);
    }

    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .post-item {
      background-color: white;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-8);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition);
    }

    .post-item:hover {
      box-shadow: var(--shadow-md);
    }

    .post-item-info h3 {
      margin-bottom: 8px;
    }

    .post-item-meta {
      font-size: 0.875rem;
      color: var(--text-light);
    }

    .post-item-actions {
      display: flex;
      gap: 12px;
    }

    .post-item-actions button, .post-item-actions a {
      padding: 8px 16px;
      font-size: 0.875rem;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state h2 {
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .dashboard-content {
        grid-template-columns: 1fr;
      }

      .dashboard-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .post-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .post-item-actions {
        width: 100%;
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="index.html" class="logo">NK</a>
      </div>
      <nav class="navbar-menu" id="navMenu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="portfolio.html" class="nav-link">Portfolio</a>
        <a href="blog.html" class="nav-link">Blog</a>
        <div class="nav-user" id="navUser">
          <a href="dashboard.html" class="nav-link active">Dashboard</a>
          <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
      </nav>
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main>
    <div class="dashboard-container">
      <div class="dashboard-header">
        <h1>Dashboard</h1>
        <a href="create-post.html" class="btn btn-primary">Create New Post</a>
      </div>

      <div class="dashboard-content">
        <aside class="sidebar">
          <h3>Quick Links</h3>
          <div class="sidebar-item">
            <a href="dashboard.html">My Posts</a>
          </div>
          <div class="sidebar-item">
            <a href="create-post.html">Create Post</a>
          </div>
          <div class="sidebar-item">
            <a href="profile.html">Edit Profile</a>
          </div>
          <div class="sidebar-item">
            <a href="#" onclick="logout(); return false;">Logout</a>
          </div>
        </aside>

        <section class="main-content">
          <h2>Your Posts</h2>
          <div class="posts-list" id="userPostsList">
            <div class="spinner"></div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-col">
          <h4>Nicolai Koldby</h4>
          <p>Web developer and digital project creator.</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Nicolai Koldby. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Require authentication
      if (!requireAuth()) return;

      const user = getCurrentUser();
      loadUserPosts(user.id);
    });

    async function loadUserPosts(userId) {
      const container = document.getElementById('userPostsList');
      container.innerHTML = '<div class="spinner"></div>';

      try {
        // TODO: Fetch user's posts from API
        // For now, show empty state
        container.innerHTML = `
          <div class="empty-state">
            <h2>No posts yet</h2>
            <p>Create your first post to get started.</p>
            <a href="create-post.html" class="btn btn-primary" style="margin-top: 20px;">Create Post</a>
          </div>
        `;
      } catch (error) {
        console.error('Error loading posts:', error);
        container.innerHTML = '<p>Failed to load posts.</p>';
      }
    }
  </script>
</body>
</html>
