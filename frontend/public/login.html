<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login or Register - Nicolai Koldby">
  <title>Login - Nicolai Koldby</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 40px;
      background-color: var(--bg-white);
      border-radius: var(--radius-12);
      box-shadow: var(--shadow-md);
    }

    .auth-container h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 30px;
      background-color: var(--bg-light);
      border-radius: var(--radius-8);
      padding: 4px;
    }

    .auth-toggle button {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-secondary);
      border-radius: var(--radius-8);
      transition: var(--transition);
    }

    .auth-toggle button.active {
      background-color: white;
      color: var(--primary-accent);
      box-shadow: var(--shadow-sm);
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-8);
      font-size: 1rem;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-accent);
      box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background-color: var(--primary-accent);
      color: white;
      border: none;
      border-radius: var(--radius-8);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-submit:hover {
      background-color: #1976d2;
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      padding: 12px;
      border-radius: var(--radius-8);
      margin-bottom: 20px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    #alertContainer {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="index.html" class="logo">NK</a>
      </div>
      <nav class="navbar-menu" id="navMenu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="portfolio.html" class="nav-link">Portfolio</a>
        <a href="blog.html" class="nav-link">Blog</a>
      </nav>
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main>
    <div class="auth-container">
      <div id="alertContainer"></div>

      <div class="auth-toggle">
        <button class="toggle-btn active" data-mode="login">Login</button>
        <button class="toggle-btn" data-mode="register">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <h1>Login</h1>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" required>
        </div>
        <button type="submit" class="btn-submit">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form">
        <h1>Create Account</h1>
        <div class="form-group">
          <label for="registerUsername">Username</label>
          <input type="text" id="registerUsername" name="username" required>
        </div>
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" name="email" required>
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" name="password" required minlength="8">
        </div>
        <button type="submit" class="btn-submit">Sign Up</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-col">
          <h4>Nicolai Koldby</h4>
          <p>Web developer and digital project creator.</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Nicolai Koldby. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    // Setup auth forms
    document.addEventListener('DOMContentLoaded', () => {
      // Check URL for mode parameter
      const mode = new URL(window.location).searchParams.get('mode') || 'login';
      switchAuthMode(mode);

      // Setup form handlers
      setupAuthForm('loginForm', async (data) => {
        return handleLogin(data.email, data.password);
      });

      setupAuthForm('registerForm', async (data) => {
        return handleRegister(data.username, data.email, data.password);
      });

      // Setup toggle buttons
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const mode = btn.getAttribute('data-mode');
          switchAuthMode(mode);
        });
      });
    });

    function switchAuthMode(mode) {
      document.querySelectorAll('.auth-form').forEach(form => {
        form.classList.remove('active');
      });

      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      if (mode === 'login') {
        document.getElementById('loginForm').classList.add('active');
        document.querySelector('[data-mode="login"]').classList.add('active');
        window.history.replaceState({}, '', '/login.html');
      } else {
        document.getElementById('registerForm').classList.add('active');
        document.querySelector('[data-mode="register"]').classList.add('active');
        window.history.replaceState({}, '', '/login.html?mode=register');
      }
    }
  </script>
</body>
</html>
